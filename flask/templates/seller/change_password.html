{% extends 'seller/basetwo.html' %}
{% block title %} ChangePassword | FishMart {% endblock %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
    .password-container {
        font-family: Arial, sans-serif;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 350px;
        margin: 0 auto;
        margin-top: 10%;
    }

    .password-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .password-container .input-group {
        position: relative;
        margin: 10px 0;
    }

    .password-container input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    .password-container .toggle-password {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        cursor: pointer;
        color: #007bff;
    }

    /* .password-container button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .password-container button:hover {
        background-color: #0056b3;
    } */

    .password-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;

        width: 100%;
        padding: 10px;
    }

    .password-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .error {
        color: red;
        text-align: center;
    }

    .message {
        color: green;
        text-align: center;
    }

    /* .password-container .toggle-password:hover {
        color: #0056b3;
    } */

    .fas.fa-eye:hover,
    .fas.fa-eye-slash:hover {
        color: #0056b3;
    }
</style>

<div class="password-container">
    <h2>Change Password</h2>

    {% if message %}
    <p class="{{ 'error' if 'Error' in message else 'message' }}">{{ message }}</p>
    {% endif %}

    <form method="POST" action="/seller_change_password">
        <div class="input-group">
            <input type="password" id="current_password" name="current_password" placeholder="Current Password"
                required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('current_password', this)"></i>
        </div>
        <div class="input-group">
            <input type="password" id="new_password" name="new_password" placeholder="New Password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('new_password', this)"></i>
        </div>
        <div class="input-group">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm New Password"
                required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm_password', this)"></i>
        </div>
        <button type="submit">Update Password</button>
    </form>
</div>

<script>
    // Function to toggle password visibility
    function togglePassword(fieldId, icon) {
        const passwordField = document.getElementById(fieldId);
        const fieldType = passwordField.getAttribute('type');
        if (fieldType === 'password') {
            passwordField.setAttribute('type', 'text');
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordField.setAttribute('type', 'password');
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
