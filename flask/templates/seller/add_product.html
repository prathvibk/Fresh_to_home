{% extends 'seller/basetwo.html' %}
{% block title %} AddProduct | FishMart {% endblock %}
{% block content %}
<style>
    .password-container {
        font-family: Arial, sans-serif;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 350px;
        margin: 0 auto;
        margin-top: 3%;
    }

    .password-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .password-container .input-group {
        position: relative;
        margin: 10px 0;
    }

    .password-container input,
    .password-container select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* .password-container button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .password-container button:hover {
        background-color: #0056b3;
    } */

    .password-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;

        width: 100%;
        padding: 10px;
    }

    .password-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .message {
        text-align: center;
        color: green;
        margin-bottom: 10px;
    }

    .error {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }
</style>

<div class="password-container">
    <h2>Add Product</h2>

    {% if message %}
    <p class="{{ 'error' if 'Error' in message else 'message' }}">{{ message }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('add_product') }}">
        <div class="input-group">
            <label for="sp_product_id">Select Product</label>
            <select id="sp_product_id" name="sp_product_id" required>
                <option value="">-- Select Product --</option>
                {% for product in products %}
                <option value="{{ product['product_id'] }}">{{ product['p_name'] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="input-group">
            <label for="sp_quantity">Quantity in KG's</label>
            <input type="number" id="sp_quantity" name="sp_quantity" placeholder="Product Quantity" required>
        </div>

        <div class="input-group">
            <label for="sp_price">Price(KG)</label>
            <input type="text" id="sp_price" name="sp_price" placeholder="Product Price" required>
        </div>

        <button type="submit">Add Product</button>
    </form>
</div>

{% endblock %}
