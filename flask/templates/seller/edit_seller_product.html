{% extends 'seller/basetwo.html' %}
{% block title %} EditSellerProduct | FishMart {% endblock %}
{% block content %}
<style>
    .edit-product-container {
        font-family: Arial, sans-serif;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 350px;
        margin: 0 auto;
        margin-top: 10%;
    }

    .edit-product-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .edit-product-container .input-group {
        position: relative;
        margin: 10px 0;
    }

    .edit-product-container input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    .edit-product-container button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .edit-product-container button:hover {
        background-color: #0056b3;
    }

    .message {
        text-align: center;
        color: green;
        margin-bottom: 10px;
    }

    .error {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }
</style>

<div class="edit-product-container">
    <h2>Edit Product</h2>

    <form method="POST" action="{{ url_for('edit_seller_product', product_id=product[0]) }}">
        <div class="input-group">
            <label for="sp_quantity">Quantity (KG's)</label>
            <input type="number" id="sp_quantity" name="sp_quantity" value="{{ product[3] }}" required>
        </div>

        <div class="input-group">
            <label for="sp_price">Price</label>
            <input type="text" id="sp_price" name="sp_price" value="{{ product[4] }}" required>
        </div>

        <button type="submit">Update Product</button>
    </form>
</div>
{% endblock %}
