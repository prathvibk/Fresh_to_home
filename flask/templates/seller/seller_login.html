{% extends ('baseone.html') %}
{% block title %} SellerLogin | FishMart {% endblock %}
{% block content %}

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
    body {
        font-family: Arial, sans-serif;
        width: 100%;
        height: 100vh;
        position: relative;
        margin: 0;

        background-image: url('/static/background/bg2.jpg');
        backdrop-filter: blur(11.1px);
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center center;
        text-align: center;

        margin: 0;
    }

    .login-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 300px;
        margin: 0;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 3%;
    }

    .login-container h2 {
        text-align: center;
    }

    .login-container input,
    .login-container button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* .login-container button {
        background-color: #28a745;
        color: white;
        border: none;
        cursor: pointer;
    }

    .login-container button:hover {
        background-color: #218838;
    } */


    .login-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .login-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .login-container .user-login-btn {
        background-color: #007bff;
    }

    .login-container .user-login-btn:hover {
        background-color: #0056b3;
    }

    .error {
        color: red;
        text-align: center;
    }

    .message {
        font-size: 1.2em;
        color: #333;
        margin-bottom: 20px;
    }

    #toggle-password {
        color: #aaa;
        cursor: pointer;
    }

    #toggle-password {
        color: #007bff;
    }

    #toggle-password:hover {
        color: #0056b3;
    }
</style>

<body>
    <div class="login-container">
        <h2>Seller Login</h2>

        {% if message %}
        <p class="message">{{ message }}</p>
        {% endif %}

        <form method="POST" action="/seller_login">
            <input type="text" name="email" placeholder="Email" required>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="password" name="password" placeholder="Password" id="password" required>
                <i class="fa fa-eye" id="toggle-password" style="position: absolute; right: 10px;"></i>
            </div>
            <button type="submit">Login</button>
        </form>

        <a href="http://localhost:3000/seller_login">
            <button type="button">Admin Login</button>
        </a>

        <a href="/buyer_login">
            <button type="button">Buyer Login</button>
        </a>

    </div>

    <script>
        document.getElementById('toggle-password').addEventListener('click', function () {
            const passwordField = document.getElementById('password');
            const toggleIcon = this;

            if (passwordField.type === 'password') {
                passwordField.type = 'text'; // Show password
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password'; // Hide password
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });
    </script>
</body>

{% endblock %}
