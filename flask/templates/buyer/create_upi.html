{% extends 'buyer/basetwo.html' %}
{% block title %} Create UPI | FishMart {% endblock %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 400px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        margin-top: 30px;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-container input,
    .form-container button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* .form-container button {
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    .form-container button:hover {
        background-color: #0056b3;
    } */

    .form-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .form-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .message {
        text-align: center;
        color: green;
        margin-bottom: 10px;
    }

    .error {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }
</style>

<div class="form-container">
    <h2>Create or Update UPI Details</h2>
    {% if message %}
    <div class="{{ 'error' if 'Error' in message else 'message' }}">{{ message }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('create_upi') }}">

        <label for="upi_id">UPI ID</label>
        <input type="text" id="upi_id" name="upi_id" value="{{ upi_id }}" required readonly>

        <label for="upi_buyer_name">Buyer Name</label>
        <input type="text" id="upi_buyer_name" name="upi_buyer_name" value="{{ upi_buyer_name }}" required readonly>

        <label for="upi_balance">UPI Balance</label>
        <input type="number" id="upi_balance" name="upi_balance" value="{{ upi_balance }}" min="0" step="0.01" required>

        <button type="submit">Save UPI Details</button>
    </form>
</div>
{% endblock %}
