{% extends 'buyer/basetwo.html' %}
{% block title %} Create UPI | FishMart {% endblock %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 600px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        margin-top: 30px;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-container input,
    .form-container button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* .form-container button {
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    .form-container button:hover {
        background-color: #0056b3;
    } */

    .form-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .form-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .message {
        text-align: center;
        color: green;
        margin-bottom: 10px;
    }

    .error {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }


    .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        /* Two equal columns */
        gap: 20px;
        /* Space between columns */
    }

    .grid-container div {
        display: flex;
        flex-direction: column;
    }
</style>

<div class="form-container">
    <h2>Update Card Details</h2>

    {% if message %}
    <div class="{{ 'error' if 'Error' in message else 'message' }}">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('create_card') }}">
        <div class="grid-container">
            <div>
                <label for="card_no">Enter Card Number</label>
                <input type="text" id="card_no" name="card_no" required>
            </div>
            <div>
                <label for="name_on_card">Enter Name on Card</label>
                <input type="text" id="name_on_card" name="name_on_card" value="{{ name_on_card }}" required>
            </div>
            <div>
                <label for="card_exp_date">Card Expiry Date (MM/YY)</label>
                <input type="text" id="card_exp_date" name="card_exp_date" placeholder="MM/YY" required>
            </div>
            <div>
                <label for="card_balance">Card Balance</label>
                <input type="number" id="card_balance" name="card_balance" value="{{ card_balance }}" min="0"
                    step="0.01" required>
            </div>
            <div>
                <label for="card_cvv">Card CVV Number</label>
                <input type="text" id="card_cvv" name="card_cvv" maxlength="3" required>
            </div>
        </div>
        <button type="submit">Save Card Details</button>
    </form>
</div>

{% endblock %}
