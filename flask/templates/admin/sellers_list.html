{% extends 'admin/basetwo.html' %}
{% block title %} SellersList | FishMart {% endblock %}
{% block content %}
<style>
    .title-button-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }

    table {
        /* width: 80%; */
        width: 70%;
        margin: 0px auto;
        border-collapse: collapse;

        background: rgba(255, 255, 255, 0.43);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(9.6px);
        -webkit-backdrop-filter: blur(9.6px);
        border: 1px solid rgba(255, 255, 255, 0.39);
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background-color: #007bff;
        color: white;
    }

    a.button,
    form button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 5px 10px;
        text-decoration: none;
        border-radius: 4px;
        cursor: pointer;
    }

    a.button:hover,
    form button:hover {
        background-color: #218838;
    }

    form {
        display: inline;
    }


    .action-button {
        padding: 5px 10px;
        /* Comfortable padding */
        font-size: 16px;
        /* Balanced font size */
        font-weight: bold;
        /* Slightly emphasized text */
        color: white;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        /* Cool gradient */
        border: none;
        border-radius: 5px;
        /* Slight rounding for a rectangular look */
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        /* Removes underline for links */
        transition: background-color 0.3s ease;
        /* Smooth hover effect */
    }

    .action-button:hover {
        background: linear-gradient(90deg, #00f2fe, #4facfe);
        /* Reverse gradient on hover */
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
        /* Subtle shadow on hover */
    }

    .action-button:active {
        background: linear-gradient(90deg, #008fb3, #005f73);
        /* Slightly darker gradient on click */
    }
</style>

<div class="title-button-container">
    <h2 style="background-color: white; padding: 5px 10px;">Sellers List</h2>

    <a href="/create_seller"><button class="styled-button">Create Seller</button></a>
</div>

<table>
    <tr>
        <!-- <th>Seller ID</th> -->
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Actions</th>
    </tr>
    {% for seller in sellers %}
    <tr>
        <!-- <td>{{ seller[0] }}</td> -->
        <td>{{ seller[1] }}</td>
        <td>{{ seller[2] }}</td>
        <td>{{ seller[3] }}</td>
        <td>{{ seller[4] }}</td>

        <td>
            <a class="action-button" href="/edit_seller/{{ seller[0] }}">Edit</a>

            <form method="POST" action="{{ url_for('delete_seller', s_code=seller[0]) }}">
                <button type="submit" class="action-button"
                    onclick="return confirm('Are you sure you want to delete this seller?');">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
