{% extends 'admin/basetwo.html' %}
{% block title %} CreateSeller | FishMart {% endblock %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 400px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 1%;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-container input,
    .form-container button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* .form-container button {
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    .form-container button:hover {
        background-color: #0056b3;
    } */

    .form-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .form-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .message {
        text-align: center;
        color: green;
        margin-bottom: 10px;
    }

    .error {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }
</style>

<div class="form-container">
    <h2>Create Seller</h2>
    {% if message %}
    <div class="{{ 'error' if 'Error' in message else 'message' }}">{{ message }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('create_seller') }}">
        <input type="text" name="s_name" placeholder="Seller Full Name" required>
        <input type="email" name="s_email" placeholder="Seller Email" required>
        <input type="password" name="s_pwd" placeholder="Password" required>
        <input type="text" name="s_phone" placeholder="Phone Number" required>
        <input type="text" name="s_address" placeholder="Address" required>
        <button type="submit">Create Seller</button>
    </form>
</div>
{% endblock %}
