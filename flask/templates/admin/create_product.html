{% extends 'admin/basetwo.html' %}
{% block title %}Create Product | YourAppName{% endblock %}
{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 400px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 3%;

        max-height: 68vh;
        min-height: 58vh;
        overflow-y: auto;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-container input,
    .form-container textarea,
    .form-container button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* .form-container button {
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    .form-container button:hover {
        background-color: #0056b3;
    } */


    .form-container button {
        background-image: linear-gradient(to right, #83a4d4 0%, #b6fbff 51%, #83a4d4 100%);
        text-align: center;
        transition: 0.5s;
        background-size: 200% auto;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    .form-container button:hover {
        background-position: right center;
        text-decoration: none;
    }

    .message {
        text-align: center;
        color: green;
        margin-bottom: 10px;
    }

    .error {
        text-align: center;
        color: red;
        margin-bottom: 10px;
    }

    .uploaded-image {
        text-align: center;
        margin-top: 20px;
    }

    .uploaded-image img {
        max-width: 150px;
        height: 150px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }


    /* Scrollbar style */
    .form-container::-webkit-scrollbar {
        width: 8px;
        border-radius: 2px;
        /* Width of the scrollbar */
    }

    .form-container::-webkit-scrollbar-thumb {
        background: black;
        border-radius: 2px;

    }

    .form-container::-webkit-scrollbar-thumb:hover {
        background: #0056b3;
        /* Darker shade on hover */
    }

    .form-container::-webkit-scrollbar-track {
        background: #f1f1f1;
        /* Color of the scrollbar track */
    }
</style>

<div class="form-container">
    <h2>Create Product</h2>
    {% if message %}
    <div class="{{ 'error' if 'Error' in message else 'message' }}">{{ message }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('create_product') }}" enctype="multipart/form-data">
        <input type="text" name="p_name" placeholder="Product Name" required>
        <input type="file" name="p_image" accept="image/*" id="p_image" required>
        <div class="uploaded-image" id="image_preview" style="display: none;">
            <h3>Selected Image:</h3>
            <img id="preview_img" alt="Selected Product Image">
        </div>
        <textarea name="p_remark" placeholder="Product Remark" required></textarea>
        <button type="submit">Create Product</button>
    </form>


</div>

<script>
    const fileInput = document.getElementById('p_image');
    const imagePreview = document.getElementById('image_preview');
    const previewImg = document.getElementById('preview_img');

    fileInput.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                imagePreview.style.display = 'block';
                previewImg.src = e.target.result;
            }
            reader.readAsDataURL(file);
        } else {
            imagePreview.style.display = 'none';
            previewImg.src = '';
        }
    });
</script>
{% endblock %}
