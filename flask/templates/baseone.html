<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>

    <style>
        /* General page styling */
        body {
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            overflow: hidden;
            width: 100%;
            height: 100vh;

            background-image: url('/static/background/bg7.jpg');
            backdrop-filter: blur(11.1px);

            /* background: rgba(21, 21, 21, 0.79);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(16.6px);
            -webkit-backdrop-filter: blur(16.6px);
            border: 1px solid rgba(21, 21, 21, 0.5); */

            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            text-align: center;

            margin: 0;
        }

        #b_o_pro_title {
            font-size: 40px;
            letter-spacing: 3px;
            color: white;
            background-color: black;
            margin: 0;
            padding: 20px 40px;
        }
    </style>
</head>

<body>
    <h1 id="b_o_pro_title">FISH MART</h1>

    <div id="b_o_container">{% block content %}{% endblock %}</div>
</body>

</html>
